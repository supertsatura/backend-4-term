<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карточка товара</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="product-card">
  <div class="product-card__image">
    <img src="images/iPhone.png" alt="Фото товара">
  </div>
  <div class="product-card__content">
    <h3 class="product-card__title">Смартфон iPhone 17 Pro</h3>
    <p class="product-card__description">
      Современный смартфон с отличной камерой, мощным процессором
      и ярким дисплеем. Поддержка 5G и быстрая зарядка.
    </p>
  </div>
</div>
</body>
</html>
