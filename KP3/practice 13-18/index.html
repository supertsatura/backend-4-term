<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заметки (13-18)</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4285f4">
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 1rem; }
        .card { background: #f5f5f5; border-radius: 8px; padding: 1rem; margin: 0.5rem 0; }
        nav button { margin: 0.25rem; padding: 0.5rem 1rem; cursor: pointer; }
        nav button.active { background: #4285f4; color: white; }
        #app-content { margin-top: 1rem; }
        .row { display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .col-3 { flex: 3; }
        .col-4 { flex: 4; }
        .col-5 { flex: 5; }
        .col-9 { flex: 9; }
        .is-center { text-align: center; }
        .button { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
        .primary { background: #4285f4; color: white; }
        .success { background: #27ae60; color: white; }
    </style>
</head>
<body>
    <header>
        <h1>Заметки (13-18)</h1>
        <p>А вот и «Заметки» - наше первое оффлайн-приложение</p>
        <nav>
            <button id="home-btn">Главная</button>
            <button id="about-btn">О приложении</button>
            <button id="enable-push">Включить уведомления</button>
            <button id="disable-push" style="display: none;">Отключить уведомления</button>
        </nav>
    </header>
    
    <main id="app-content"></main>
    
    <!-- Socket.IO клиент (ОБЯЗАТЕЛЬНО!) -->
    <script src="http://localhost:3001/socket.io/socket.io.js"></script>
    <script src="app.js" defer></script>
</body>
</html>
